<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lunifer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #261842 0%, #0f0a1a 60%);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(680px, calc(100vw - 32px));
      padding: 32px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      background: rgba(20, 13, 33, 0.88);
      box-shadow: 0 24px 60px rgba(0,0,0,0.3);
    }
    a { color: #c4b0ff; }
    p { color: rgba(255,255,255,0.72); }
  </style>
</head>
<body>
  <main>
    <h1>Lunifer</h1>
    <p>This static site is used to host public policy pages for the Lunifer app.</p>
    <p><a href="/privacy-policy.html">Open the Privacy Policy</a></p>
  </main>
</body>
</html>
